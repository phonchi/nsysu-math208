<div class="ds07-anim" id="quick">
  <h3 style="margin-top:0;color:var(--accent2);">快速排序互動 — pivot + partition</h3>
  <div class="viz-layout">
    <div>
      <div class="viz-panel">
        <div class="algo-canvas" id="canvas-quick" style="height:340px;"><div class="bars-container"></div><div class="baseline"></div></div>
        <div class="status-banner"><span class="status-icon">›</span><span class="status-text" id="quickStatus">按「開始」執行快速排序</span></div>
        <div class="input-row">
          <label>陣列：</label>
          <input type="text" id="quickArrInput" value="54, 26, 93, 17, 77, 31, 44, 55, 20">
          <button class="btn btn-shuffle" id="quickShuffle">隨機洗牌</button>
          <button class="btn btn-shuffle" id="quickApply" style="background:var(--accent2);">套用</button>
        </div>
        <div class="input-row">
          <label>pivot 策略：</label>
          <button class="preset-btn active" data-pivot="first">第一個 (講義版本)</button>
          <button class="preset-btn" data-pivot="median">三者取中</button>
        </div>
        <div class="controls-bar">
          <button class="btn btn-play" id="quickPlay">▶ 開始</button>
          <button class="btn btn-step" id="quickStep">→ 單步</button>
          <button class="btn btn-reset" id="quickReset">↺ 重置</button>
          <div style="flex:1;min-width:140px;display:flex;align-items:center;gap:.4rem;">
            <span style="font-size:.74rem;color:var(--muted);">速度</span>
            <input type="range" id="quickSpeed" min="100" max="1500" step="50" value="500" style="flex:1;">
          </div>
        </div>
      </div>
    </div>
    <div class="side-panel">
      <div class="info-card">
        <div class="ic-title">即時狀態 <span class="ic-badge">LIVE</span></div>
        <div class="ic-row"><span class="ic-label">pivot</span><span class="ic-value highlight" id="quickPivot">—</span></div>
        <div class="ic-row"><span class="ic-label">[first, last]</span><span class="ic-value" id="quickRange">—</span></div>
        <div class="ic-row"><span class="ic-label">left_mark</span><span class="ic-value" id="quickLM" style="color:#16a085;">—</span></div>
        <div class="ic-row"><span class="ic-label">right_mark</span><span class="ic-value" id="quickRM" style="color:#d35400;">—</span></div>
        <div class="stats-grid" style="margin-top:.4rem;">
          <div class="stat-tile compare"><div class="stat-label">比較</div><div class="stat-value" id="quickCmp">0</div></div>
          <div class="stat-tile swap"><div class="stat-label">交換</div><div class="stat-value" id="quickSwp">0</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>(function go(){ if(!window.DS07||!window.DS07.init){setTimeout(go,50);return;} window.DS07.init.quick(); })();</script>
