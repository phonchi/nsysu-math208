<div class="ds09-anim" id="ds09-inorder">
  <h3 style="margin-top:0;color:var(--accent2);">中序走訪 Inorder — 左 → root → 右</h3>
  <div class="viz-layout">
    <div>
      <div class="viz-panel">
        <div class="tree-canvas" id="canvas-travIn" style="height:280px;">
          <svg class="edges-layer"></svg>
          <div class="nodes-layer"></div>
        </div>
        <div class="status-banner"><span class="status-icon">›</span><span class="status-text" id="travStatusIn">點「開始」播放動畫，或用「單步」逐步觀察</span></div>
        <div class="traversal-output" id="travOutputIn"><span style="color:rgba(255,255,255,.4)">輸出將顯示在此 →</span></div>
        <div class="preset-row">
          <button class="preset-btn" data-trav="preorder">Preorder 前序</button>
          <button class="preset-btn active" data-trav="inorder">Inorder 中序</button>
          <button class="preset-btn" data-trav="postorder">Postorder 後序</button>
        </div>
        <div class="preset-row">
          <button class="preset-btn active" data-tree="parse">解析樹 (3+(4*5))</button>
          <button class="preset-btn" data-tree="bst">BST 範例</button>
          <button class="preset-btn" data-tree="balanced">完整二元樹</button>
        </div>
        <div class="controls-bar">
          <button class="btn btn-play" id="travPlayIn">▶ 開始</button>
          <button class="btn btn-step" id="travStepIn">→ 單步</button>
          <button class="btn btn-reset" id="travResetIn">↺ 重置</button>
          <div style="flex:1;min-width:160px;display:flex;align-items:center;gap:.5rem;">
            <span style="font-size:.78em;color:var(--muted);">速度</span>
            <input type="range" id="travSpeedIn" min="200" max="1800" step="100" value="700" style="flex:1;accent-color:var(--accent3);">
          </div>
        </div>
      </div>
    </div>
    <div class="side-panel">
      <div class="info-card">
        <div class="ic-title">虛擬碼 <span class="ic-badge" style="background:var(--accent2)">CODE</span></div>
        <div class="pseudo-code" id="travCodeIn"><span class="line" data-l="1"><span class="kw">def</span> <span class="fn">inorder</span>(tree):</span>
<span class="line" data-l="2">&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span> tree:</span>
<span class="line" data-l="3">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="fn">inorder</span>(tree.left)</span>
<span class="line" data-l="4">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="fn">visit</span>(tree.key)   <span class="com"># root</span></span>
<span class="line" data-l="5">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="fn">inorder</span>(tree.right)</span></div>
      </div>
      <div class="info-card">
        <div class="ic-title">遞迴呼叫堆疊 <span class="ic-badge" style="background:var(--accent2)">STACK</span></div>
        <div class="stack-vis" id="travStackIn">
          <div class="stack-label">call stack ↓</div>
        </div>
      </div>
      <div class="info-card">
        <div class="ic-title">用途</div>
        <div style="font-size:.83em;line-height:1.55;">
          <strong>Inorder</strong>：BST 上得到<strong>排序輸出</strong>；解析樹上得到中序表達式。
        </div>
      </div>
    </div>
  </div>
</div>
<script>(function go(){ if(!window.DS09||!window.DS09.init){setTimeout(go,50);return;} window.DS09.init.inorder(); })();</script>
