<div class="ds08-anim" id="ds08-dijkstra">
<h3 style="margin-top:0;color:var(--accent2);">Dijkstra 最短路徑 — 加權圖上的「貪婪式 BFS」</h3>
<div class="viz-layout">
<div>
<div class="viz-panel">
<div class="graph-canvas" id="canvas-dijkstraDij" style="height:240px;"></div>
<div class="status-banner"><span class="status-icon">›</span><span class="status-text" id="dijStatusDij">選擇起點，按「開始」執行 Dijkstra</span></div>
<div class="slider-row">
<span class="slider-label">起點</span>
<select id="dijStartDij" style="font-family:'JetBrains Mono',monospace;padding:.3rem .5rem;border-radius:6px;border:1px solid var(--card-border);background:#fff;">
<option selected="" value="u">u</option><option value="v">v</option><option value="w">w</option>
<option value="x">x</option><option value="y">y</option><option value="z">z</option>
</select>
<span style="font-size:.78rem;color:var(--muted);">速度</span>
<input id="dijSpeedDij" max="2000" min="200" step="50" style="flex:1;accent-color:var(--accent3);" type="range" value="800"/>
</div>
<div class="controls-bar">
<button class="btn btn-play" id="dijPlayDij">▶ 開始</button>
<button class="btn btn-step" id="dijStepDij">→ 單步</button>
<button class="btn btn-reset" id="dijResetDij">↺ 重置</button>
</div>
<div style="margin-top:.7rem;font-family:'JetBrains Mono',monospace;font-size:.78rem;">
<strong style="color:var(--accent2);">Priority Queue：</strong>
<span class="ds-display" id="dijPQDij"><span class="ds-empty">empty</span></span>
</div>
</div>
</div>
<div class="side-panel">
<div class="info-card">
<div class="ic-title">距離表 <span class="ic-badge">LIVE</span></div>
<div id="dijTableDij" style="overflow-x:auto;"></div>
</div>

</div>
</div>
</div>
<script>(function go(){ if(!window.DS08||!window.DS08.init){setTimeout(go,50);return;} window.DS08.init.dijkstra(); })();</script>
