<div class="ds08-anim" id="ds08-dfs">
<h3 style="margin-top:0;color:var(--accent2);">DFS 深度優先搜尋 — 一條路走到黑，碰壁再回頭</h3>
<div class="viz-layout">
<div>
<div class="viz-panel">
<div class="graph-canvas" id="canvas-dfsDfs" style="height:240px;"></div>
<div class="status-banner"><span class="status-icon">›</span><span class="status-text" id="dfsStatusDfs">按「開始」跑完整 DFS（會走遍整個 forest）</span></div>
<div class="slider-row">
<span class="slider-label">起點</span>
<select id="dfsStartDfs" style="font-family:'JetBrains Mono',monospace;padding:.3rem .5rem;border-radius:6px;border:1px solid var(--card-border);background:#fff;">
<option selected="" value="A">A</option><option value="B">B</option><option value="C">C</option>
<option value="D">D</option><option value="E">E</option><option value="F">F</option>
</select>
<span style="font-size:.78rem;color:var(--muted);">速度</span>
<input id="dfsSpeedDfs" max="1500" min="200" step="50" style="flex:1;accent-color:var(--accent3);" type="range" value="700"/>
</div>
<div class="controls-bar">
<button class="btn btn-play" id="dfsPlayDfs">▶ 開始</button>
<button class="btn btn-step" id="dfsStepDfs">→ 單步</button>
<button class="btn btn-reset" id="dfsResetDfs">↺ 重置</button>
</div>
<div style="margin-top:.7rem;font-family:'JetBrains Mono',monospace;font-size:.78rem;">
<strong style="color:var(--accent2);">Recursion stack（隱式）：</strong>
<span class="ds-display" id="dfsStackDfs"><span class="ds-empty">empty</span></span>
</div>
<div style="margin-top:.4rem;font-family:'JetBrains Mono',monospace;font-size:.78rem;">
<strong style="color:var(--accent2);">時間計數：</strong>
<span id="dfsTimeDfs" style="color:var(--accent);font-weight:700;">0</span>
</div>
</div>
</div>
<div class="side-panel">
<div class="info-card">
<div class="ic-title">頂點時間表</div>
<div id="dfsTableDfs" style="overflow-x:auto;"></div>
</div>

</div>
</div>
</div>
<script>(function go(){ if(!window.DS08||!window.DS08.init){setTimeout(go,50);return;} window.DS08.init.dfs(); })();</script>
