<div class="ds09-anim" id="ds09-bst-search">
<h3 style="margin-top:0;color:var(--accent2);">BST 搜尋 (get) — 沿樹下移比較 key</h3>
<div class="viz-layout">
<div>
<div class="viz-panel">
<div class="tree-canvas" id="canvas-bstSearch" style="height:280px;">
<svg class="edges-layer"></svg>
<div class="nodes-layer"></div>
</div>
<div class="status-banner"><span class="status-icon">›</span><span class="status-text" id="bstStatusSearch">輸入 key 後按 get 進行搜尋</span></div>
<div class="input-row">
<label>初始 keys：</label>
<input id="bstInitInputSearch" type="text" value="70, 31, 93, 94, 14, 23, 73"/>
<button class="btn btn-reset" id="bstApplyInitSearch">建立樹</button>
<button class="btn btn-shuffle" id="bstShuffleSearch">隨機</button>
</div>
<div class="input-row">
<label>搜尋 key：</label>
<input id="bstOpKeySearch" style="width:80px;" type="number" value="23"/>
<button class="btn btn-play" data-bstop="put">put (插入)</button>
<button class="btn btn-play" data-bstop="get" style="background:var(--accent2);">get (搜尋)</button>
</div>
<div class="controls-bar">
<button class="btn btn-step" id="bstStepSearch">→ 單步</button>
<button class="btn btn-reset" id="bstResetSearch">↺ 重置</button>
<div style="flex:1;min-width:160px;display:flex;align-items:center;gap:.5rem;">
<span style="font-size:.78em;color:var(--muted);">速度</span>
<input id="bstSpeedSearch" max="1800" min="200" step="100" style="flex:1;accent-color:var(--accent3);" type="range" value="700"/>
</div>
</div>
</div>
</div>
<div class="side-panel">

<div class="info-card">
<div class="ic-title" id="bstCodeTitleSearch">虛擬碼 — _get <span class="ic-badge" style="background:var(--accent2)">CODE</span></div>
<div class="pseudo-code" id="bstCodeSearch" style="font-size:.73em;">
<span class="line" data-l="1"><span class="kw">def</span> <span class="fn">_get</span>(key, cur):</span>
<span class="line" data-l="2">    <span class="kw">if not</span> cur: <span class="kw">return None</span></span>
<span class="line" data-l="3">    <span class="kw">if</span> cur.key == key:</span>
<span class="line" data-l="4">        <span class="kw">return</span> cur</span>
<span class="line" data-l="5">    <span class="kw">elif</span> key &lt; cur.key:</span>
<span class="line" data-l="6">        <span class="kw">return</span> <span class="fn">_get</span>(key, cur.left)</span>
<span class="line" data-l="7">    <span class="kw">else</span>:</span>
<span class="line" data-l="8">        <span class="kw">return</span> <span class="fn">_get</span>(key, cur.right)</span>
</div>
</div>
</div>
</div>
</div>
<script>(function go(){ if(!window.DS09||!window.DS09.init){setTimeout(go,50);return;} window.DS09.init.bstSearch(); })();</script>
